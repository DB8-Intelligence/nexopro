# cloudbuild.yaml — build da imagem NexoOmnix com NEXT_PUBLIC_* como --build-arg.
#
# Por que existe:
#   `gcloud run deploy --source .` com `--build-env-vars-file` NÃO propaga
#   essas vars como --build-arg para o Dockerfile (a flag foi feita para
#   Cloud Native Buildpacks, não para Dockerfile builds). Os ARG NEXT_PUBLIC_*
#   ficavam vazios, e Next.js embutia `""` em metadataBase/sitemap, quebrando
#   `Collecting page data` na build com `new URL('')`.
#
#   Esse cloudbuild.yaml resolve passando build-args explicitamente, e
#   separando build (Cloud Build) de deploy (Cloud Run --image=...).
#
# Uso (passando substitutions vias):
#
#   # 1. Build da imagem (carrega NEXT_PUBLIC_* das vars do ambiente local)
#   gcloud builds submit \
#     --config=cloudbuild.yaml \
#     --project=viralreel-ai-493701 \
#     --region=us-central1 \
#     --substitutions=^||^_NEXT_PUBLIC_SUPABASE_URL="$NEXT_PUBLIC_SUPABASE_URL"||_NEXT_PUBLIC_SUPABASE_ANON_KEY="$NEXT_PUBLIC_SUPABASE_ANON_KEY"||_NEXT_PUBLIC_APP_URL="https://nexoomnix.com"||_NEXT_PUBLIC_APP_NAME="NexoOmnix"||_NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY="$NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY"
#
#   # `^||^` é o delimiter alternativo do gcloud — necessário porque os JWT
#   # values podem conter vírgulas. Sem isso, gcloud quebra na primeira `,`.
#
#   # 2. Deploy do Cloud Run referenciando a imagem :latest
#   gcloud run deploy nexoomnix-web-smoke \
#     --image=us-central1-docker.pkg.dev/viralreel-ai-493701/cloud-run-source-deploy/nexoomnix-web:latest \
#     --project=viralreel-ai-493701 \
#     --region=us-central1 \
#     --allow-unauthenticated \
#     --memory=1Gi --cpu=1 \
#     --min-instances=0 --max-instances=2 \
#     --port=8080 --timeout=300 \
#     --env-vars-file=<runtime.yaml com server-side secrets>

substitutions:
  _NEXT_PUBLIC_SUPABASE_URL: ''
  _NEXT_PUBLIC_SUPABASE_ANON_KEY: ''
  _NEXT_PUBLIC_APP_URL: 'https://nexoomnix.com'
  _NEXT_PUBLIC_APP_NAME: 'NexoOmnix'
  _NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY: ''
  _REPO: 'cloud-run-source-deploy'
  _IMAGE: 'nexoomnix-web'
  _REGION: 'us-central1'

steps:
  - id: build
    name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '--build-arg'
      - 'NEXT_PUBLIC_SUPABASE_URL=${_NEXT_PUBLIC_SUPABASE_URL}'
      - '--build-arg'
      - 'NEXT_PUBLIC_SUPABASE_ANON_KEY=${_NEXT_PUBLIC_SUPABASE_ANON_KEY}'
      - '--build-arg'
      - 'NEXT_PUBLIC_APP_URL=${_NEXT_PUBLIC_APP_URL}'
      - '--build-arg'
      - 'NEXT_PUBLIC_APP_NAME=${_NEXT_PUBLIC_APP_NAME}'
      - '--build-arg'
      - 'NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY=${_NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY}'
      - '-t'
      - '${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/${_IMAGE}:${BUILD_ID}'
      - '-t'
      - '${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/${_IMAGE}:latest'
      - '.'

images:
  - '${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/${_IMAGE}:${BUILD_ID}'
  - '${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/${_IMAGE}:latest'

options:
  logging: CLOUD_LOGGING_ONLY
  machineType: 'E2_HIGHCPU_8'

timeout: '1200s'
